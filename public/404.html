<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Page Not Found</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        font-family: 'Fira Code', 'SF Mono', Monaco, monospace;
        background: #ffffff;
        color: #1b1f24;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 0.5rem;
      }
      h1::before {
        content: '$ ';
        color: #1a8b3f;
      }
      p {
        color: #59636e;
        font-size: 14px;
      }
      a {
        color: #0969da;
        text-decoration: none;
      }
      a:hover {
        color: #1a8b3f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404: page not found</h1>
      <p>The page you're looking for doesn't exist.</p>
      <p><a href="/">cd ~/ (back to home)</a></p>
    </main>
  </body>
</html>
