<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Page Not Found</title>
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --bg: #fafafb;
        --surface: #ffffff;
        --border: rgba(16, 18, 24, 0.09);
        --text: #15171c;
        --text-2: #4d5159;
        --accent: #5a64f0;
        --accent-2: #7c86ff;
        --glow: rgba(124, 134, 255, 0.16);
      }
      :root[data-theme='dark'] {
        --bg: #0b0d11;
        --surface: #12151b;
        --border: rgba(235, 238, 245, 0.08);
        --text: #eceef2;
        --text-2: #a6abb6;
        --accent: #8e96ff;
        --accent-2: #aab0ff;
        --glow: rgba(110, 120, 255, 0.2);
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image: radial-gradient(700px 420px at 50% -10%, var(--glow), transparent 64%);
      }
      main {
        text-align: center;
        padding: 2.5rem;
        max-width: 28rem;
      }
      .code {
        font-size: 4.5rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
        background: linear-gradient(100deg, var(--accent), var(--accent-2) 60%, #5ed2fa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.6rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 14.5px;
        color: var(--text-2);
        margin-bottom: 1.6rem;
      }
      a {
        display: inline-block;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border-radius: 999px;
        padding: 10px 22px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has moved.</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
