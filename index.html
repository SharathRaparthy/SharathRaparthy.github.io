    <script>
      // Set the theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <div id="root"></div>
    <script>
      // Inline watchdog: runs even if the app bundle fails or crashes.
      // If anything leaves the root empty after boot (hydration crash,
      // DOM-mutating extension, missing bundle), restore the prerendered HTML.
      (function () {
        var root = document.getElementById('root');
        var snapshot = root ? root.innerHTML : '';
        if (!snapshot) return;
        setTimeout(function () {
          if (root.childElementCount === 0) {
            root.innerHTML = snapshot;
            if (window.__errs) window.__errs.push('inline watchdog restored content');
          }
        }, 2000);
      })();
    </script>
    <script type="module" src="/src/site.ts"></script>
    <script>
      // Visit /?debug=1 to overlay render diagnostics on the page.
      if (location.search.indexOf('debug') !== -1) {
        window.__errs = [];
        window.addEventListener('error', function (e) {
          window.__errs.push((e.message || String(e)).slice(0, 120));
        });
        setTimeout(function () {
          var root = document.getElementById('root');
          var h1 = document.querySelector('h1');
          var hero = document.querySelector('.hero-section');
          var box = document.createElement('pre');
          box.style.cssText =
            'position:fixed;left:8px;bottom:8px;z-index:2147483647;background:#000;color:#0f0;' +
            'font:11px/1.5 monospace;padding:10px 12px;border-radius:8px;max-width:92vw;' +
            'white-space:pre-wrap;opacity:1;transform:none;';
          box.textContent = [
            'root children: ' + (root ? root.children.length : 'NO #root'),
            'h1 text: ' + (h1 ? h1.textContent.slice(0, 40) : 'NONE'),
            'hero opacity: ' + (hero ? getComputedStyle(hero).opacity : '-'),
            'hero display: ' + (hero ? getComputedStyle(hero).display : '-'),
            'hydrated: ' + (window.__APP_LOADED__ === true),
            'theme: ' + document.documentElement.getAttribute('data-theme'),
            'body bg: ' + getComputedStyle(document.body).backgroundColor,
            'js errors: ' + (window.__errs.join(' | ') || 'none'),
            'ua: ' + navigator.userAgent.slice(0, 90),
          ].join('\n');
          document.body.appendChild(box);
        }, 2500);
      }
    </script>
